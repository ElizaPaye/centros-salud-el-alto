{% extends "base.html" %}
{% block content %}

<h3>Editar Especialidad</h3>

<form method="POST">
    <input name="nombre" value="{{ especialidad.nombre }}" class="form-control mb-2" required>
    <input name="descripcion" value="{{ especialidad.descripcion }}" class="form-control mb-2">

    <button class="btn btn-primary">Actualizar</button>
</form>

{% endblock %}
